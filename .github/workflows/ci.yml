name: Backend CI/CD — Build, Push ECR, Deploy EC2

on:
  push:
    branches:
      - "**"

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: alumnos-app

permissions:
  contents: write

jobs:
  build-push-ecr:
    name: Build & Push ECR
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Dar permisos a Gradle
        run: chmod +x gradlew

      - name: Generar JAR sin tests
        run: ./gradlew clean bootJar -x test -Dnet.bytebuddy.experimental=true

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy EC2-App via SSM
    runs-on: ubuntu-latest
    needs: build-push-ecr

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Leer Instance ID de EC2-App desde Parameter Store
        id: get-instance
        run: |
          EC2_APP=$(aws ssm get-parameter \
            --name "/alumnos/ec2/app" \
            --query "Parameter.Value" \
            --output text)

          echo "instance_id=$EC2_APP" >> $GITHUB_OUTPUT
          echo "EC2-App: $EC2_APP"

      - name: Enviar deploy via SSM
        id: ssm-cmd
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ec2-user /home/ec2-user/deploy-app.sh"]}' \
            --comment "Deploy backend latest" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $CMD_ID"

      - name: Esperar resultado
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
              --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Intento $i/30 — $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy completado correctamente"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy falló"
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deploy no terminó dentro del tiempo esperado"
          exit 1