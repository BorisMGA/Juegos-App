name: Backend CI/CD - Quality Test Security Build Push ECR Deploy EC2

on:
  push:
    branches:
      - "**"

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: alumnos-app

permissions:
  contents: write

jobs:
  code-quality:
    name: Code Quality OpenRewrite Spotless PMD
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: OpenRewrite dry-run
        continue-on-error: true
        run: gradle rewriteDryRun -Dnet.bytebuddy.experimental=true --no-daemon || true

      - name: Spotless verificar formato
        continue-on-error: true
        run: gradle spotlessCheck -Dnet.bytebuddy.experimental=true --no-daemon || true

      - name: PMD analisis estatico
        continue-on-error: true
        run: gradle pmdMain pmdTest -Dnet.bytebuddy.experimental=true --no-daemon || true

      - name: Subir reporte PMD
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: build/reports/pmd/
          retention-days: 7

  build-and-test:
    name: Build and Test cobertura
    runs-on: ubuntu-latest
    needs: code-quality
    if: always()
    continue-on-error: true

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Compilar y ejecutar tests
        continue-on-error: true
        run: gradle clean check jacocoTestReport -Dnet.bytebuddy.experimental=true --no-daemon || true

      - name: Subir reporte Jacoco
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: |
            build/reports/jacoco/test/html/
            build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 7

      - name: Subir resultado de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 7

  security:
    name: Security Analysis SonarCloud Snyk
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    continue-on-error: true

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build para analisis
        continue-on-error: true
        run: gradle clean assemble -Dnet.bytebuddy.experimental=true --no-daemon || true

      - name: Descargar reporte Jacoco
        uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/test/
        continue-on-error: true

      - name: SonarCloud
        continue-on-error: true
        run: |
          gradle sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=false \
            -Dnet.bytebuddy.experimental=true \
            --no-daemon || true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Snyk CLI
        continue-on-error: true
        run: npm install -g snyk@latest || true

      - name: Snyk SCA
        continue-on-error: true
        run: |
          snyk test \
            --severity-threshold=high \
            --fail-on=all \
            --configuration-matching='^(compile|runtime|default)$' || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk SARIF
        if: always()
        continue-on-error: true
        run: |
          snyk test \
            --severity-threshold=high \
            --configuration-matching='^(compile|runtime|default)$' \
            --sarif-file-output=snyk.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Subir reporte Snyk
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-security-report
          path: snyk.sarif
          retention-days: 7

  versioning:
    name: Semantic Version v1.x.0
    runs-on: ubuntu-latest
    needs: security
    if: always()
    outputs:
      new_tag: ${{ steps.calc.outputs.new_tag }}

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular version
        id: calc
        run: |
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -1)

          if [ -z "$LAST" ]; then
            NEW="v1.0.0"
          else
            MINOR=$(echo $LAST | cut -d. -f2)
            NEW="v1.$((MINOR + 1)).0"
          fi

          echo "new_tag=$NEW" >> $GITHUB_OUTPUT
          echo "Nuevo tag: $NEW"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$NEW" >/dev/null 2>&1; then
            echo "El tag $NEW ya existe"
          else
            git tag $NEW
            git push origin $NEW
          fi

  build-push-ecr:
    name: Build and Push ECR
    runs-on: ubuntu-latest
    needs: versioning
    if: always()

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Generar JAR de produccion
        run: gradle clean bootJar -x test -Dnet.bytebuddy.experimental=true --no-daemon

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy EC2-App via SSM
    runs-on: ubuntu-latest
    needs: build-push-ecr

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Leer Instance ID de EC2-App desde Parameter Store
        id: get-instance
        run: |
          EC2_APP=$(aws ssm get-parameter \
            --name "/alumnos/ec2/app" \
            --query "Parameter.Value" \
            --output text)

          echo "instance_id=$EC2_APP" >> $GITHUB_OUTPUT
          echo "EC2-App: $EC2_APP"

      - name: Enviar deploy via SSM
        id: ssm-cmd
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo -u ec2-user /home/ec2-user/deploy-app.sh"]}' \
            --comment "Deploy backend latest" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $CMD_ID"

      - name: Esperar resultado deploy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
              --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Intento $i/30 - $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy completado correctamente"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy fallo"
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deploy no termino dentro del tiempo esperado"
          exit 1